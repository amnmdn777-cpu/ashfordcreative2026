<?xml version="1.0" encoding="UTF-8"?>
<!--
  Garden hero — illustrated greenhouse therapy room (placeholder).
  Phase 4 swaps this for a photographic asset; the SVG keeps the page
  shippable in the meantime. Sage primary + cream surface + terracotta
  planters, three named houseplants matching the alt copy:
  peace lily (left), monstera (centre), fiddle-leaf fig (right).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-label="A sunlit therapy room with a peace lily, monstera, and fiddle-leaf fig">
  <!-- Wall -->
  <rect x="0" y="0" width="1200" height="700" fill="#F8F4E9"/>
  <!-- Floor -->
  <rect x="0" y="700" width="1200" height="300" fill="#E8E0CC"/>

  <!-- Tall window with morning light spill -->
  <g>
    <path d="M520 80 Q520 30 600 30 Q680 30 680 80 L680 540 L520 540 Z" fill="#FFFCF5" stroke="#C8C5B5" stroke-width="2"/>
    <line x1="600" y1="40" x2="600" y2="540" stroke="#C8C5B5" stroke-width="1"/>
    <line x1="520" y1="220" x2="680" y2="220" stroke="#C8C5B5" stroke-width="1"/>
    <line x1="520" y1="380" x2="680" y2="380" stroke="#C8C5B5" stroke-width="1"/>
  </g>
  <polygon points="520,90 920,90 1100,700 520,700" fill="#FFF5DD" opacity="0.35"/>

  <!-- Peace Lily, left of window in terracotta pot -->
  <g transform="translate(140 480)">
    <ellipse cx="80" cy="220" rx="100" ry="14" fill="#C8C5B5" opacity="0.5"/>
    <path d="M20 120 L140 120 L130 220 L30 220 Z" fill="#C97B5A"/>
    <path d="M20 120 L140 120 L138 132 L22 132 Z" fill="#A86545"/>
    <!-- leaves: long lance-shape -->
    <path d="M80 120 Q40 60 60 -10 Q90 30 84 110" fill="#3F5641"/>
    <path d="M80 120 Q120 50 110 -20 Q70 10 78 110" fill="#3F5641" opacity="0.85"/>
    <path d="M80 120 Q60 70 30 30 Q70 80 80 110" fill="#3F5641" opacity="0.7"/>
    <path d="M80 120 Q100 70 130 30 Q90 80 80 110" fill="#3F5641" opacity="0.7"/>
    <!-- white spadix flower -->
    <path d="M86 -10 Q100 -30 92 -50 Q80 -36 86 -10" fill="#FFFCF5" stroke="#3F5641" stroke-width="0.6"/>
    <line x1="92" y1="-10" x2="84" y2="40" stroke="#3F5641" stroke-width="0.8"/>
  </g>

  <!-- Monstera, in front of window centre -->
  <g transform="translate(520 480)">
    <ellipse cx="80" cy="220" rx="120" ry="14" fill="#C8C5B5" opacity="0.5"/>
    <path d="M0 130 L160 130 L150 220 L10 220 Z" fill="#C97B5A"/>
    <path d="M0 130 L160 130 L156 142 L4 142 Z" fill="#A86545"/>
    <!-- characteristic split leaves -->
    <g fill="#3F5641">
      <path d="M80 130 Q-20 70 -20 -20 Q40 -50 90 -10 Q90 10 70 20 Q90 30 88 60 Q70 60 60 80 Q90 90 88 130 Z"/>
      <path d="M80 130 Q180 70 180 -20 Q120 -50 70 -10 Q70 10 90 20 Q70 30 72 60 Q90 60 100 80 Q70 90 72 130 Z" opacity="0.85"/>
      <path d="M80 130 Q40 70 30 0 Q70 30 80 90 Z" opacity="0.7"/>
    </g>
    <!-- holes on leaves -->
    <g fill="#F8F4E9">
      <ellipse cx="40" cy="40" rx="6" ry="14"/>
      <ellipse cx="50" cy="80" rx="5" ry="10"/>
      <ellipse cx="120" cy="40" rx="6" ry="14"/>
      <ellipse cx="110" cy="80" rx="5" ry="10"/>
    </g>
  </g>

  <!-- Fiddle-leaf Fig, right -->
  <g transform="translate(900 380)">
    <ellipse cx="60" cy="320" rx="90" ry="14" fill="#C8C5B5" opacity="0.5"/>
    <path d="M10 220 L120 220 L110 320 L20 320 Z" fill="#C97B5A"/>
    <path d="M10 220 L120 220 L116 232 L14 232 Z" fill="#A86545"/>
    <!-- woody trunk -->
    <path d="M60 220 L62 110 Q56 60 60 0" stroke="#5A4839" stroke-width="3" fill="none"/>
    <!-- characteristic violin-shaped leaves -->
    <g fill="#3F5641">
      <path d="M60 30 Q20 0 24 -50 Q60 -40 60 0 Z"/>
      <path d="M60 30 Q100 0 96 -50 Q60 -40 60 0 Z" opacity="0.85"/>
      <path d="M60 70 Q14 50 10 -10 Q60 0 60 50 Z"/>
      <path d="M60 70 Q106 50 110 -10 Q60 0 60 50 Z" opacity="0.85"/>
      <path d="M60 130 Q10 110 4 50 Q60 60 60 110 Z"/>
      <path d="M60 130 Q110 110 116 50 Q60 60 60 110 Z" opacity="0.85"/>
      <path d="M60 200 Q10 180 4 120 Q60 130 60 180 Z" opacity="0.95"/>
      <path d="M60 200 Q110 180 116 120 Q60 130 60 180 Z" opacity="0.8"/>
    </g>
  </g>

  <!-- Reading chair -->
  <g transform="translate(280 700)">
    <rect x="0" y="20" width="180" height="160" rx="14" fill="#F2EBDA"/>
    <rect x="0" y="0" width="180" height="40" rx="14" fill="#E5DCBE"/>
    <rect x="-10" y="60" width="20" height="100" rx="10" fill="#E5DCBE"/>
    <rect x="170" y="60" width="20" height="100" rx="10" fill="#E5DCBE"/>
    <rect x="20" y="180" width="14" height="20" fill="#5A4839"/>
    <rect x="146" y="180" width="14" height="20" fill="#5A4839"/>
  </g>

  <!-- Rug -->
  <ellipse cx="640" cy="900" rx="500" ry="40" fill="#C97B5A" opacity="0.18"/>

  <!-- Soft sun beam wash on floor -->
  <polygon points="520,540 920,540 1080,820 380,820" fill="#FFF5DD" opacity="0.25"/>
</svg>
