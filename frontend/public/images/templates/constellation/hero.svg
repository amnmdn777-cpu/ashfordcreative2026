<?xml version="1.0" encoding="UTF-8"?>
<!--
  Constellation hero — low-key lit Houston office at dusk (placeholder).
  Phase 4 swaps for real photography. Deep navy + warm gold accents
  through window blinds, desk lamp glow, faint city skyline visible.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="cn-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B1426"/>
      <stop offset="60%" stop-color="#1A2332"/>
      <stop offset="100%" stop-color="#0F1828"/>
    </linearGradient>
    <linearGradient id="cn-window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E5A547" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E5A547" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cn-lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE7B5" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#E5A547" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#E5A547" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Wall + floor -->
  <rect x="0" y="0" width="1600" height="1000" fill="url(#cn-sky)"/>

  <!-- Tall window panel left — dusk light through vertical blinds -->
  <g>
    <rect x="80" y="60" width="380" height="780" fill="#0F1828" stroke="#A8B0BC" stroke-width="0.6" stroke-opacity="0.3"/>
    <!-- Vertical blinds, gold rim light -->
    <g fill="url(#cn-window)">
      <rect x="100" y="80" width="36" height="740"/>
      <rect x="148" y="80" width="36" height="740"/>
      <rect x="196" y="80" width="36" height="740"/>
      <rect x="244" y="80" width="36" height="740"/>
      <rect x="292" y="80" width="36" height="740"/>
      <rect x="340" y="80" width="36" height="740"/>
      <rect x="388" y="80" width="36" height="740"/>
    </g>
    <!-- Faint distant skyline silhouette -->
    <g fill="#1A2332" opacity="0.7">
      <rect x="100" y="540" width="40" height="280"/>
      <rect x="146" y="500" width="34" height="320"/>
      <rect x="186" y="560" width="56" height="260"/>
      <rect x="248" y="480" width="40" height="340"/>
      <rect x="294" y="520" width="48" height="300"/>
      <rect x="346" y="500" width="38" height="320"/>
      <rect x="390" y="540" width="34" height="280"/>
    </g>
    <!-- Tiny window-lights in skyline -->
    <g fill="#E5A547" opacity="0.55">
      <rect x="110" y="570" width="2" height="3"/>
      <rect x="118" y="610" width="2" height="3"/>
      <rect x="160" y="540" width="2" height="3"/>
      <rect x="170" y="600" width="2" height="3"/>
      <rect x="206" y="600" width="2" height="3"/>
      <rect x="226" y="640" width="2" height="3"/>
      <rect x="260" y="540" width="2" height="3"/>
      <rect x="270" y="600" width="2" height="3"/>
      <rect x="306" y="560" width="2" height="3"/>
      <rect x="318" y="640" width="2" height="3"/>
      <rect x="354" y="540" width="2" height="3"/>
      <rect x="368" y="610" width="2" height="3"/>
      <rect x="396" y="580" width="2" height="3"/>
      <rect x="410" y="640" width="2" height="3"/>
    </g>
  </g>

  <!-- Desk: long matte slab right of window -->
  <g transform="translate(560 660)">
    <rect x="0" y="0" width="900" height="20" fill="#0F1828"/>
    <rect x="0" y="20" width="900" height="280" fill="#050810"/>
    <rect x="40" y="280" width="14" height="60" fill="#0B1426"/>
    <rect x="846" y="280" width="14" height="60" fill="#0B1426"/>
  </g>

  <!-- Desk lamp glow + bulb -->
  <ellipse cx="720" cy="560" rx="280" ry="160" fill="url(#cn-lamp)"/>
  <g transform="translate(670 540)">
    <path d="M0 100 L 100 100 L 90 30 L 10 30 Z" fill="#1A2332"/>
    <ellipse cx="50" cy="32" rx="40" ry="6" fill="#E5A547"/>
    <line x1="50" y1="100" x2="50" y2="120" stroke="#1A2332" stroke-width="3"/>
    <rect x="20" y="120" width="60" height="6" fill="#1A2332"/>
  </g>

  <!-- Open laptop on desk -->
  <g transform="translate(880 600)">
    <path d="M0 80 L 280 80 L 260 -10 L 20 -10 Z" fill="#0B1426"/>
    <rect x="20" y="-6" width="240" height="80" fill="#1A2332"/>
    <rect x="0" y="80" width="280" height="14" rx="2" fill="#1A2332"/>
    <!-- Faint screen glow -->
    <rect x="40" y="6" width="80" height="50" rx="3" fill="#E5A547" opacity="0.18"/>
    <rect x="130" y="6" width="60" height="50" rx="3" fill="#A8B0BC" opacity="0.15"/>
  </g>

  <!-- Hardback book stack -->
  <g transform="translate(1280 650)">
    <rect x="0" y="0" width="120" height="20" fill="#1A2332"/>
    <rect x="6" y="-22" width="108" height="22" fill="#0F1828"/>
    <rect x="12" y="-44" width="96" height="22" fill="#1A2332"/>
    <line x1="6" y1="-2" x2="114" y2="-2" stroke="#E5A547" stroke-width="0.6" opacity="0.6"/>
  </g>

  <!-- Subtle floor reflection -->
  <rect x="0" y="940" width="1600" height="60" fill="#000000" opacity="0.6"/>
</svg>
