<?xml version="1.0" encoding="UTF-8"?>
<!-- Polaroid photo 1 placeholder — therapy office. Phase 4 swaps for a real photo. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="wall1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAF6EC"/>
      <stop offset="100%" stop-color="#E5DCBE"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="400" height="220" fill="url(#wall1)"/>
  <rect x="0" y="220" width="400" height="80" fill="#A28A6F"/>
  <!-- Window frame -->
  <rect x="180" y="20" width="100" height="160" fill="#FFFCF5" stroke="#5C6470" stroke-width="2"/>
  <line x1="230" y1="20" x2="230" y2="180" stroke="#5C6470" stroke-width="1"/>
  <line x1="180" y1="100" x2="280" y2="100" stroke="#5C6470" stroke-width="1"/>
  <!-- Sun spill -->
  <polygon points="280,70 380,90 380,220 220,220" fill="#FFF5DD" opacity="0.5"/>
  <!-- Two armchairs -->
  <g transform="translate(40 170)">
    <rect x="0" y="0" width="100" height="60" rx="10" fill="#264653"/>
    <rect x="6" y="-20" width="88" height="30" rx="8" fill="#264653"/>
  </g>
  <g transform="translate(260 170)">
    <rect x="0" y="0" width="100" height="60" rx="10" fill="#E29578"/>
    <rect x="6" y="-20" width="88" height="30" rx="8" fill="#E29578"/>
  </g>
  <!-- Coffee table -->
  <rect x="170" y="200" width="60" height="14" fill="#5C6470"/>
</svg>
