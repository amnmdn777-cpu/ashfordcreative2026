<?xml version="1.0" encoding="UTF-8"?>
<!--
  Hello Friend hero — Sam with a mug, mid-laugh (placeholder).
  Indigo / coral / butter palette. Slight tilt + masking-tape edge
  applied by the skin component, not baked here. Phase 4 swaps for
  a real photograph.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" preserveAspectRatio="xMidYMid slice" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="hf-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD86B"/>
      <stop offset="100%" stop-color="#FFF5EE"/>
    </linearGradient>
    <radialGradient id="hf-mug-steam" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFCF5" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFCF5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Warm yellow-to-cream wall -->
  <rect x="0" y="0" width="600" height="700" fill="url(#hf-wall)"/>

  <!-- Decorative coral blob upper-left -->
  <ellipse cx="80" cy="120" rx="130" ry="80" fill="#FF8C7A" opacity="0.45"/>
  <!-- Decorative indigo blob lower-right -->
  <ellipse cx="500" cy="600" rx="160" ry="90" fill="#2D2A6E" opacity="0.18"/>

  <!-- Sam — shoulders, head, hair (short crop, undercut hint), laughing -->
  <g transform="translate(170 200)">
    <!-- shoulders / oversized t-shirt — coral -->
    <path d="M-40 500 L 30 200 Q 130 180 230 200 L 300 500 Z" fill="#FF8C7A"/>
    <!-- neck -->
    <rect x="112" y="156" width="36" height="44" fill="#C18E68"/>
    <!-- head -->
    <ellipse cx="130" cy="120" rx="64" ry="68" fill="#C18E68"/>
    <!-- hair — short crop, undercut on the right side -->
    <path d="M62 110 Q 60 38 130 30 Q 200 38 198 110 Q 200 64 152 60 Q 174 80 178 110 Q 154 100 130 100 Q 106 100 82 110 Q 82 80 104 60 Q 60 70 62 110 Z" fill="#2D2A6E"/>
    <!-- small undercut shaved area -->
    <path d="M184 92 L 196 100 L 196 116 L 182 110 Z" fill="#1F1B3F"/>
    <!-- mid-laugh: open smile, eyes mostly closed -->
    <path d="M104 120 Q 110 116 116 120" stroke="#1F1B3F" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M144 120 Q 150 116 156 120" stroke="#1F1B3F" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <!-- Open laughing mouth -->
    <path d="M108 148 Q 130 168 152 148 Q 152 162 130 162 Q 108 162 108 148 Z" fill="#1F1B3F"/>
    <path d="M114 152 Q 130 162 146 152" stroke="#FFFCF5" stroke-width="0.8" fill="#FFFCF5"/>
    <!-- earring (tiny butter dot) -->
    <circle cx="74" cy="138" r="3" fill="#FFD86B"/>
  </g>

  <!-- Mug being lifted (lower-left, slightly tilted) -->
  <g transform="translate(120 540) rotate(-8)">
    <!-- steam -->
    <path d="M40 -4 Q 32 -22 48 -36 Q 64 -50 52 -68" stroke="#FFFCF5" stroke-width="2.4" fill="none" opacity="0.8" stroke-linecap="round"/>
    <path d="M60 -8 Q 54 -26 70 -42 Q 84 -56 74 -74" stroke="#FFFCF5" stroke-width="2.4" fill="none" opacity="0.8" stroke-linecap="round"/>
    <ellipse cx="50" cy="0" rx="46" ry="8" fill="#2D2A6E"/>
    <path d="M0 0 L 4 90 Q 50 100 96 90 L 100 0 Z" fill="#2D2A6E"/>
    <path d="M96 12 Q 124 16 124 50 Q 124 84 96 88" stroke="#2D2A6E" stroke-width="10" fill="none"/>
    <ellipse cx="50" cy="0" rx="42" ry="6" fill="#1F1B3F"/>
    <!-- doodle on mug -->
    <path d="M22 36 Q 30 28 40 36 Q 50 44 60 36 Q 70 28 80 36" stroke="#FFD86B" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Tiny butter-coloured decorative asterisk floating -->
  <g transform="translate(440 220)" stroke="#2D2A6E" stroke-width="2.4" stroke-linecap="round">
    <line x1="0" y1="-12" x2="0" y2="12"/>
    <line x1="-12" y1="0" x2="12" y2="0"/>
    <line x1="-8" y1="-8" x2="8" y2="8"/>
    <line x1="8" y1="-8" x2="-8" y2="8"/>
  </g>
</svg>
