<?xml version="1.0" encoding="UTF-8"?>
<!--
  Atrium hero — illustrated therapy office.
  Slate-and-linen palette (matches PALETTES.atrium_brass), composed of:
    - tall arched window with morning light + plant silhouette
    - low linen sofa with two cushions, draped throw, side table
    - reading lamp + open book + ceramic cup
    - bookshelf with vertical ledger volumes
    - rug edge
  Authored as flat illustration so the file ships as ~6KB and scales
  cleanly to any hero size. Colors reference the canonical Atrium
  palette literals so the SVG reads correctly even outside the
  ThemeProvider. (The image is decorative; alt copy in the template
  describes "a quiet therapy office at morning light".)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="A quiet therapy office at morning light">
  <!-- Wall -->
  <rect x="0" y="0" width="1440" height="640" fill="#f5f1ea"/>
  <!-- Floor -->
  <rect x="0" y="640" width="1440" height="260" fill="#e6dfd0"/>
  <!-- Floor shadow under sofa -->
  <ellipse cx="640" cy="780" rx="440" ry="22" fill="#c8bba1" opacity="0.55"/>

  <!-- Tall arched window (left) -->
  <g>
    <path d="M120 180 Q120 80 240 80 Q360 80 360 180 L360 600 L120 600 Z" fill="#ffffff" stroke="#aab8c9" stroke-width="2"/>
    <!-- Mullions -->
    <line x1="240" y1="80" x2="240" y2="600" stroke="#aab8c9" stroke-width="1.4"/>
    <line x1="120" y1="320" x2="360" y2="320" stroke="#aab8c9" stroke-width="1.4"/>
    <line x1="120" y1="460" x2="360" y2="460" stroke="#aab8c9" stroke-width="1.4"/>
    <!-- Morning light -->
    <path d="M125 185 Q125 85 240 85 Q355 85 355 185 L355 595 L125 595 Z" fill="url(#sunlight)"/>
  </g>

  <!-- Sun beam slanting onto floor -->
  <polygon points="360,180 760,180 920,640 360,640" fill="#fff8e7" opacity="0.32"/>
  <polygon points="360,300 700,300 820,640 360,640" fill="#fff8e7" opacity="0.22"/>

  <!-- Plant silhouette on left near window -->
  <g transform="translate(60 460)">
    <ellipse cx="32" cy="180" rx="48" ry="14" fill="#c8bba1" opacity="0.5"/>
    <rect x="6" y="120" width="52" height="60" rx="4" fill="#52647d"/>
    <path d="M32 120 Q-4 70 18 24 Q34 42 32 78 Q44 36 70 18 Q66 56 50 86 Q72 60 96 56 Q86 86 64 110 Z" fill="#6c7e63"/>
    <path d="M32 120 Q14 88 22 56" stroke="#52647d" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Bookshelf right -->
  <g transform="translate(1100 240)">
    <rect x="0" y="0" width="260" height="360" fill="#1a2230"/>
    <rect x="8" y="8" width="244" height="112" fill="#2a3447"/>
    <rect x="8" y="124" width="244" height="112" fill="#2a3447"/>
    <rect x="8" y="240" width="244" height="112" fill="#2a3447"/>
    <!-- ledger volumes -->
    <g fill="#aab8c9">
      <rect x="20" y="20" width="14" height="92"/>
      <rect x="40" y="14" width="12" height="98"/>
      <rect x="58" y="22" width="14" height="90"/>
      <rect x="78" y="18" width="12" height="94"/>
      <rect x="96" y="24" width="14" height="88"/>
      <rect x="116" y="14" width="12" height="98"/>
      <rect x="134" y="22" width="14" height="90"/>
      <rect x="156" y="18" width="12" height="94"/>
      <rect x="176" y="24" width="14" height="88"/>
      <rect x="198" y="20" width="12" height="92"/>
      <rect x="218" y="22" width="14" height="90"/>
    </g>
    <g fill="#52647d">
      <rect x="20" y="136" width="14" height="92"/>
      <rect x="42" y="142" width="12" height="86"/>
      <rect x="60" y="138" width="14" height="90"/>
      <rect x="80" y="144" width="12" height="84"/>
      <rect x="98" y="140" width="14" height="88"/>
      <rect x="118" y="142" width="12" height="86"/>
      <rect x="136" y="138" width="14" height="90"/>
      <rect x="160" y="146" width="12" height="82"/>
      <rect x="178" y="140" width="14" height="88"/>
      <rect x="200" y="142" width="12" height="86"/>
      <rect x="220" y="138" width="14" height="90"/>
    </g>
    <g fill="#aab8c9" opacity="0.72">
      <rect x="20" y="252" width="14" height="92"/>
      <rect x="42" y="258" width="12" height="86"/>
      <rect x="62" y="252" width="14" height="92"/>
      <rect x="82" y="260" width="12" height="84"/>
      <rect x="100" y="252" width="14" height="92"/>
      <rect x="122" y="256" width="12" height="88"/>
      <rect x="140" y="252" width="14" height="92"/>
      <rect x="162" y="262" width="12" height="82"/>
      <rect x="180" y="252" width="14" height="92"/>
      <rect x="202" y="258" width="12" height="86"/>
      <rect x="222" y="252" width="14" height="92"/>
    </g>
  </g>

  <!-- Side table + lamp + cup + book -->
  <g transform="translate(420 540)">
    <!-- Table -->
    <rect x="0" y="80" width="148" height="14" fill="#2a3447"/>
    <rect x="10" y="94" width="6" height="120" fill="#2a3447"/>
    <rect x="132" y="94" width="6" height="120" fill="#2a3447"/>
    <!-- Lamp -->
    <path d="M40 14 L100 14 L114 80 L26 80 Z" fill="#1a2230"/>
    <rect x="68" y="80" width="4" height="0" fill="#1a2230"/>
    <ellipse cx="70" cy="14" rx="32" ry="6" fill="#52647d"/>
    <!-- Soft glow under lamp -->
    <ellipse cx="70" cy="84" rx="80" ry="20" fill="#fff5cc" opacity="0.5"/>
    <!-- Open book -->
    <g transform="translate(80 70)">
      <path d="M0 8 L24 0 L24 14 L0 22 Z" fill="#ffffff"/>
      <path d="M24 0 L48 8 L48 22 L24 14 Z" fill="#f5f1ea"/>
      <line x1="24" y1="0" x2="24" y2="14" stroke="#aab8c9" stroke-width="0.6"/>
    </g>
    <!-- Cup -->
    <ellipse cx="22" cy="74" rx="14" ry="4" fill="#1a2230"/>
    <path d="M8 74 L10 86 Q22 90 34 86 L36 74 Z" fill="#52647d"/>
    <ellipse cx="22" cy="74" rx="12" ry="3" fill="#1a2230"/>
  </g>

  <!-- Sofa -->
  <g transform="translate(560 520)">
    <!-- back -->
    <rect x="20" y="0" width="600" height="120" rx="20" fill="#e8dfca"/>
    <!-- seat -->
    <rect x="0" y="100" width="640" height="120" rx="22" fill="#d9cfb5"/>
    <!-- cushions -->
    <rect x="40" y="20" width="170" height="100" rx="14" fill="#f0e8d5"/>
    <rect x="430" y="20" width="170" height="100" rx="14" fill="#f0e8d5"/>
    <!-- throw -->
    <path d="M250 50 Q330 30 410 60 L420 130 Q330 110 240 134 Z" fill="#aab8c9" opacity="0.85"/>
    <path d="M250 50 Q330 30 410 60" stroke="#52647d" stroke-width="1" fill="none" opacity="0.4"/>
    <!-- legs -->
    <rect x="20" y="220" width="14" height="22" fill="#2a3447"/>
    <rect x="606" y="220" width="14" height="22" fill="#2a3447"/>
  </g>

  <!-- Rug -->
  <ellipse cx="780" cy="820" rx="540" ry="36" fill="#c8bba1" opacity="0.45"/>
  <path d="M260 800 Q780 760 1300 800 L1300 840 Q780 800 260 840 Z" fill="#aab8c9" opacity="0.32"/>

  <!-- Subtle paper grain overlay -->
  <rect x="0" y="0" width="1440" height="900" fill="url(#noise)" opacity="0.05"/>

  <defs>
    <linearGradient id="sunlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff5cc"/>
      <stop offset="60%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f1ea"/>
    </linearGradient>
    <pattern id="noise" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#1a2230"/>
    </pattern>
  </defs>
</svg>
